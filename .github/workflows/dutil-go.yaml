name: Build Go executable

on:
  push:
    tags:
      - 'v*'     # stable releases
      - 'rc-*'   # release candidates

permissions:
  contents: write
  pull-requests: read
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # ensures full history for changelog generation
      - uses: actions/setup-go@v5                                                                                                                                                                                  
        with:                                                                                                                                                                                                      
          go-version: '1.24'

      - name: Build dutil (linux/amd64)                                                                                                                                                                            
        run: GOOS=linux GOARCH=amd64 go build -o dutil-linux-amd64                                                                                                                                                 
   
      - name: Build dutil (darwin/arm64)                                                                                                                                                                           
        run: GOOS=darwin GOARCH=arm64 go build -o dutil-darwin-arm64
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'rc-') }}
          files: |
            dutil*